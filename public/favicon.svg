<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="k" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" fill="#0A0F1E"/>
  <!-- Subtle gradient overlay -->
  <rect width="64" height="64" rx="14" fill="url(#bg)" opacity="0.15"/>
  <!-- Border -->
  <rect x="1" y="1" width="62" height="62" rx="13" fill="none" stroke="url(#bg)" stroke-width="1.5" opacity="0.6"/>
  <!-- K letterform -->
  <g fill="none" stroke="url(#bg)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Vertical bar of K -->
    <line x1="20" y1="13" x2="20" y2="51"/>
    <!-- Upper arm of K -->
    <line x1="20" y1="32" x2="44" y2="13"/>
    <!-- Lower arm of K -->
    <line x1="20" y1="32" x2="44" y2="51"/>
  </g>
</svg>
